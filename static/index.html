<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MarkItDown</title>
<style>
  :root {
    --bg:      #1e1e2e;
    --surface: #2a2a3d;
    --surface2:#313145;
    --accent:  #7c6af7;
    --accent2: #6a58e0;
    --text:    #cdd6f4;
    --sub:     #a6adc8;
    --success: #a6e3a1;
    --error:   #f38ba8;
    --border:  #45475a;
    --radius:  10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, "SF Pro Text", sans-serif;
    min-height: 100vh; display: flex; flex-direction: column;
  }

  /* ── header ── */
  header {
    background: var(--surface);
    padding: 18px 28px;
    display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 22px; color: var(--accent); font-weight: 700; }
  header span { font-size: 13px; color: var(--sub); }

  /* ── main ── */
  main { flex: 1; display: flex; flex-direction: column; gap: 16px; padding: 20px 28px; }

  /* ── drop zone ── */
  #dropzone {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s;
  }
  #dropzone.dragover { border-color: var(--accent); background: var(--surface2); }
  #dropzone p { color: var(--sub); font-size: 15px; margin-bottom: 12px; }
  #dropzone input { display: none; }

  /* ── buttons ── */
  .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
  button {
    border: none; border-radius: 8px; cursor: pointer;
    font-size: 14px; font-weight: 600; padding: 10px 20px;
    transition: background .15s, opacity .15s;
  }
  button:disabled { opacity: .4; cursor: default; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:not(:disabled):hover { background: var(--accent2); }
  .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:not(:disabled):hover { background: var(--surface2); }
  .btn-ghost { background: transparent; color: var(--sub); border: 1px solid var(--border); }
  .btn-ghost:hover { color: var(--text); border-color: var(--sub); }

  /* ── file name ── */
  #filename {
    font-size: 13px; color: var(--sub);
    background: var(--surface2); border-radius: 6px;
    padding: 8px 14px; display: none;
    border: 1px solid var(--border);
  }
  #filename.visible { display: inline-block; color: var(--text); }

  /* ── progress ── */
  #progress-bar {
    height: 3px; background: var(--border); border-radius: 2px; overflow: hidden;
    display: none;
  }
  #progress-bar.visible { display: block; }
  #progress-fill {
    height: 100%; width: 0%; background: var(--accent);
    transition: width .3s;
    animation: indeterminate 1.4s ease infinite;
  }
  @keyframes indeterminate {
    0%   { transform: translateX(-100%) scaleX(.4); }
    50%  { transform: translateX(60%)   scaleX(.6); }
    100% { transform: translateX(200%)  scaleX(.4); }
  }

  /* ── status ── */
  #status {
    font-size: 13px; color: var(--sub);
    padding: 6px 0;
    min-height: 24px;
  }
  #status.success { color: var(--success); }
  #status.error   { color: var(--error); }

  /* ── output ── */
  #output-wrap {
    flex: 1; display: flex; flex-direction: column; gap: 6px;
    min-height: 0;
  }
  #output-label {
    font-size: 11px; font-weight: 700; letter-spacing: .08em;
    color: var(--sub); text-transform: uppercase;
  }
  #output {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    font-family: "SF Mono", "Fira Code", monospace;
    font-size: 13px;
    color: var(--text);
    resize: none;
    outline: none;
    min-height: 300px;
    white-space: pre-wrap;
    overflow-y: auto;
    line-height: 1.65;
  }

  /* ── stats ── */
  #stats { font-size: 12px; color: var(--sub); text-align: right; }
</style>
</head>
<body>

<header>
  <h1>⬡ MarkItDown</h1>
  <span>Convert any file to Markdown · Local &amp; Private</span>
</header>

<main>

  <!-- Drop zone -->
  <div id="dropzone" onclick="document.getElementById('fileinput').click()">
    <p>📂 Drop a file here or click to browse</p>
    <p style="font-size:12px;color:var(--sub)">PDF · DOCX · PPTX · XLSX · HTML · CSV · JSON · XML · ZIP · EPUB · Images · Audio</p>
    <input type="file" id="fileinput"/>
  </div>

  <!-- File name pill -->
  <span id="filename"></span>

  <!-- Buttons -->
  <div class="btn-row">
    <button class="btn-primary" id="btn-convert" disabled onclick="convert()">▶ Convert to Markdown</button>
    <button class="btn-secondary" id="btn-save" disabled onclick="saveFile()">💾 Save .md</button>
    <button class="btn-secondary" id="btn-copy" disabled onclick="copyText()">📋 Copy</button>
    <button class="btn-ghost" onclick="clearAll()">✕ Clear</button>
  </div>

  <!-- Progress -->
  <div id="progress-bar"><div id="progress-fill"></div></div>

  <!-- Status -->
  <div id="status">Ready</div>

  <!-- Output -->
  <div id="output-wrap">
    <div id="output-label">Output</div>
    <textarea id="output" readonly placeholder="Converted Markdown will appear here…"></textarea>
    <div id="stats"></div>
  </div>

</main>

<script>
  let selectedFile = null;

  // ── drag & drop ──────────────────────────────────────────────────
  const dz = document.getElementById("dropzone");
  dz.addEventListener("dragover", e => { e.preventDefault(); dz.classList.add("dragover"); });
  dz.addEventListener("dragleave", () => dz.classList.remove("dragover"));
  dz.addEventListener("drop", e => {
    e.preventDefault(); dz.classList.remove("dragover");
    const f = e.dataTransfer.files[0];
    if (f) loadFile(f);
  });
  document.getElementById("fileinput").addEventListener("change", e => {
    if (e.target.files[0]) loadFile(e.target.files[0]);
  });

  function loadFile(f) {
    selectedFile = f;
    const fn = document.getElementById("filename");
    fn.textContent = "📄 " + f.name;
    fn.classList.add("visible");
    document.getElementById("btn-convert").disabled = false;
    setStatus("Loaded: " + f.name, "");
  }

  // ── convert ──────────────────────────────────────────────────────
  async function convert() {
    if (!selectedFile) return;
    document.getElementById("btn-convert").disabled = true;
    document.getElementById("btn-convert").textContent = "Converting…";
    document.getElementById("btn-save").disabled = true;
    document.getElementById("btn-copy").disabled = true;
    document.getElementById("progress-bar").classList.add("visible");
    setStatus("Converting…", "");

    const form = new FormData();
    form.append("file", selectedFile);

    try {
      const res = await fetch("/convert", { method: "POST", body: form });
      const data = await res.json();
      if (data.error) {
        setStatus("✗ " + data.error, "error");
      } else {
        const out = document.getElementById("output");
        out.value = data.markdown;
        const lines = data.markdown.split("\n").length;
        const words = data.markdown.split(/\s+/).filter(Boolean).length;
        document.getElementById("stats").textContent =
          `${lines} lines · ${words} words · ${data.markdown.length} chars`;
        setStatus("✓ Done", "success");
        document.getElementById("btn-save").disabled = false;
        document.getElementById("btn-copy").disabled = false;
      }
    } catch (e) {
      setStatus("✗ Network error: " + e.message, "error");
    }

    document.getElementById("btn-convert").disabled = false;
    document.getElementById("btn-convert").textContent = "▶ Convert to Markdown";
    document.getElementById("progress-bar").classList.remove("visible");
  }

  // ── save ─────────────────────────────────────────────────────────
  function saveFile() {
    const text = document.getElementById("output").value;
    if (!text) return;
    const name = selectedFile ? selectedFile.name.replace(/\.[^.]+$/, "") + ".md" : "output.md";
    const blob = new Blob([text], { type: "text/markdown" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = name;
    a.click();
    setStatus("✓ Saved as " + name, "success");
  }

  // ── copy ─────────────────────────────────────────────────────────
  async function copyText() {
    const text = document.getElementById("output").value;
    await navigator.clipboard.writeText(text);
    setStatus("✓ Copied to clipboard!", "success");
  }

  // ── clear ────────────────────────────────────────────────────────
  function clearAll() {
    selectedFile = null;
    document.getElementById("fileinput").value = "";
    document.getElementById("filename").classList.remove("visible");
    document.getElementById("output").value = "";
    document.getElementById("stats").textContent = "";
    document.getElementById("btn-convert").disabled = true;
    document.getElementById("btn-save").disabled = true;
    document.getElementById("btn-copy").disabled = true;
    setStatus("Ready", "");
  }

  function setStatus(msg, cls) {
    const s = document.getElementById("status");
    s.textContent = msg;
    s.className = cls;
  }
</script>
</body>
</html>
