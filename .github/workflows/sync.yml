name: Sync to HuggingFace Spaces

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to HuggingFace Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "yaswanth@markitdown"
          git config --global user.name "Yaswanth Boggarapu"
          git remote add hf https://yaswanthb0420:$HF_TOKEN@huggingface.co/spaces/yaswanthb0420/markitdown-gui
          git push hf main --force
